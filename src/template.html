<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
 <div class="wrapper">
    <div class="search">
        <search> <!--search start-->
            <form id="form">
                <!--<label for="weather-search">Location:</label>-->
                <input type="search" id="weather-search" name="weather-search" placeholder="Type here..." required>
                <button class="search-button" type="submit">SEARCH</button>
            </form>
        </search>
    </div> <!--search end-->
        <div class="hidden"> <!--hidden start-->
            <div class="main">
                <div class="location">Virginia Beach, VA, United States</div>
                <div class="main-temp">77&deg</div>
                <div class="condition">Clear</div>
                <div class="main-temp-range">
                    <div class="main-high">H: 82&deg</div>
                    <div class="main-low">L: 75&deg</div>
                </div>
            </div> <!--main end-->

            <div class="display-container">
                <div class="days-forecast">
                    <div class="day-forecast">
                        <div class="date">Thursday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Friday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Saturday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Sunday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Monday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Tuesday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Wednesday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Thursday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Friday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                    <div class="day-forecast">
                        <div class="date">Saturday</div>
                        <div class="icon"></div>
                        <div class="temp-low">78</div>
                        <div class="temp-high">90</div>
                    </div>
                </div>
                <div class="conditions">
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-thermometer"></div>
                            <div class="cond-text">FEELS LIKE</div>
                        </div>
                        <div class="cond-value" id="feels"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-humidity"></div>
                            <div class="cond-text">HUMIDITY</div>
                        </div>
                        <div class="cond-value" id="humid"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-raindrop"></div>
                            <div class="cond-text">PRECIPITATION</div>
                        </div>
                        <div class="cond-value" id="precip"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-rain-mix"></div>
                            <div class="cond-text">PRECIP PROBABILITY</div>
                        </div>
                        <div class="cond-value" id="precip-prob"></div>
                    
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-hot"></div>
                            <div class="cond-text">UV INDEX</div>
                        </div>
                        <div class="cond-value" id="uv"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-day-sunny-overcast"></div>
                            <div class="cond-text">VISIBILITY</div>
                        </div>
                        <div class="cond-value" id="vis"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-sunrise"></div>
                            <div class="cond-text">SUNRISE</div>
                        </div>
                        <div class="cond-value" id="sunrise"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-sunset"></div>
                            <div class="cond-text">SUNSET</div>
                        </div>
                        <div class="cond-value" id="sunset"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-snowflake-cold"></div>
                            <div class="cond-text">SNOW</div>
                        </div>
                        <div class="cond-value" id="snow"></div>
                    </div>
                    <div class="cond-rec">
                        <div class="cond-icon-and-text">
                            <div class="wi wi-strong-wind"></div>
                            <div class="cond-text">WIND</div>
                        </div>
                        <div class="cond-value" id="wind"></div>
                    </div>
                </div>
            </div>
    </div> <!--hidden end-->
 </div> <!--wrapper end-->

</body>
</html>
